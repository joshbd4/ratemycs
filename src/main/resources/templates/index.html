<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel = "stylesheet" href = "/css/style.css">
</head>
<body>
    <nav>
        <a th:href="@{/ratings}">Rate My CS Teaching Staff</a>

        <a th:href="@{/ratings/new}" id="addRating">+ Add Rating</a>
    </nav>
    <main>
        <h1>
            Staff Ratings
        </h1>

        <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Role</th>
                <th>Overall Score</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="rating : ${ratings}">
            <td th:text="${rating.name}"></td>
            <td th:text="${rating.roleType}"></td>
            <td th:text="${rating.overallScore}"></td>
            <td>
            <a th:href="@{/ratings/{id}(id=${rating.id})}">View</a>
            <a th:href="@{/ratings/{id}/edit(id=${rating.id})}">Edit</a>
            <form th:action="@{/ratings/{id}/delete(id=${rating.id})}" method="post" style="display:inline;">
            <button type="submit" onclick="return confirm('Are you sure you want to delete this rating?');">Delete</button>
            </form>
            </td>
            </tr>
            </tbody>
            </table>
    </main>
    <footer> &copy Rate My CS Teaching Staff</footer>
</body>
</html>
